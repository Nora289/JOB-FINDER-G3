name: job_finder
description: "Job Finder - ស្វែករកការងារ"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.1
  go_router: ^14.0.0
  shared_preferences: ^2.2.2
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  file_picker: ^8.0.0
  image_picker: ^1.0.7
  intl: ^0.19.0
  smooth_page_indicator: ^1.1.0
  flutter_staggered_animations: ^1.1.1
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
